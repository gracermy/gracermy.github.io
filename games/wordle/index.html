<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle · gracermy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1a0f; color: #e8f0ea;
    font-family: 'Outfit', sans-serif;
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    padding: 24px;
  }
  body::before {
    content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(83,141,78,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(181,159,59,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .back-link {
    position: fixed; top: 14px; left: 16px;
    font-size: 0.78rem; color: rgba(255,255,255,0.35); text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: rgba(255,255,255,0.7); }
  .icon { font-size: 3rem; line-height: 1; }
  h1 {
    font-family: 'DM Serif Display', serif; font-size: clamp(2.4rem, 7vw, 3.5rem);
    background: linear-gradient(135deg, #538d4e, #b59f3b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  p { font-size: 0.95rem; color: rgba(255,255,255,0.4); font-weight: 300; text-align: center; max-width: 300px; line-height: 1.6; }
  .badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: #538d4e;
    border: 1px solid rgba(83,141,78,0.35); border-radius: 20px; padding: 5px 14px;
  }
</style>
</head>
<body>
<a href="/games/" class="back-link">← Games</a>
<div class="icon">🟩</div>
<h1>Wordle</h1>
<span class="badge">Coming soon</span>
<p>Guess the hidden 5-letter word in six tries. Green means right place, yellow means wrong place.</p>
</body>
</html>
