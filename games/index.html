<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gracermy</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-muted: #a0a0a0;
    --accent: #2563eb;
    --accent-soft: rgba(37, 99, 235, 0.06);
    --accent-hover: rgba(37, 99, 235, 0.1);
    --border: #e8e8e4;
    --border-hover: #d0d0cc;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── NAV ── */
  nav {
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
  }
  nav .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-size: 0.9rem;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
    font-weight: 400;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a.active { color: var(--text); font-weight: 500; }

  /* ── HERO ── */
  .hero {
    padding: 80px 0 60px;
  }
  .hero h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.8rem, 6vw, 4rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .hero h1 .wave {
    display: inline-block;
    animation: wave 2.5s ease-in-out infinite;
    transform-origin: 70% 70%;
  }
  @keyframes wave {
    0%, 100% { transform: rotate(0deg); }
    10% { transform: rotate(14deg); }
    20% { transform: rotate(-8deg); }
    30% { transform: rotate(14deg); }
    40% { transform: rotate(-4deg); }
    50% { transform: rotate(10deg); }
    60%, 100% { transform: rotate(0deg); }
  }
  .hero p {
    font-size: 1.15rem;
    color: var(--text-secondary);
    max-width: 520px;
    line-height: 1.7;
    font-weight: 300;
  }
  .hero p strong {
    color: var(--text);
    font-weight: 500;
  }

  /* ── SECTIONS ── */
  .section {
    padding: 48px 0;
    border-top: 1px solid var(--border);
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  /* ── CARDS ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
  }
  .card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    transform: translateY(-1px);
  }
  .card-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .card-info h3 {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .card-info p {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .card-arrow {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 1.1rem;
    transition: transform 0.2s, color 0.2s;
  }
  .card:hover .card-arrow { transform: translateX(3px); color: var(--accent); }

  /* ── FOOTER ── */
  footer {
    padding: 40px 0;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  footer p {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: center;
    font-weight: 300;
  }

  /* ── ENTRY ANIMATION ── */
  .fade-up {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.6s ease forwards;
  }
  .fade-up:nth-child(1) { animation-delay: 0s; }
  .fade-up:nth-child(2) { animation-delay: 0.1s; }
  .fade-up:nth-child(3) { animation-delay: 0.2s; }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .hero { padding: 50px 0 40px; }
    nav { padding: 20px 0; }
    .nav-links { gap: 20px; }
  }
</style>
</head>
<body>

<nav>
  <div class="container">
    <a href="/" class="nav-logo">gracermy</a>
    <div class="nav-links">
      <a href="/" class="active">Home</a>
      <a href="/games/">Games</a>
    </div>
  </div>
</nav>

<main>
  <div class="container">
    <section class="hero">
      <h1 class="fade-up">Hi, I'm gracermy <span class="wave">👋</span></h1>
      <p class="fade-up">A <strong>software engineer</strong> who builds things on the side. This is a small corner of the internet where I collect my experiments, side projects, and creative work.</p>
    </section>

    <section class="section fade-up">
      <div class="section-label">Explore</div>
      <div class="card-grid">
        <a href="/games/" class="card">
          <div class="card-icon">🎮</div>
          <div class="card-info">
            <h3>Games</h3>
            <p>Browser-based puzzles & games</p>
          </div>
          <span class="card-arrow">→</span>
        </a>
        <!--
        <a href="/projects/" class="card">
          <div class="card-icon">🛠</div>
          <div class="card-info">
            <h3>Projects</h3>
            <p>Tools & experiments</p>
          </div>
          <span class="card-arrow">→</span>
        </a>
        -->
      </div>
    </section>
  </div>
</main>

<footer>
  <div class="container">
    <p>© 2026 gracermy · Built with curiosity</p>
  </div>
</footer>

</body>
</html>
