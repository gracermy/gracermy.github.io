name: Generate puzzles

on:
  schedule:
    - cron: '0 0 1 * *'        # 1st of every month, midnight UTC
  workflow_dispatch:            # manual trigger from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Suguru puzzles
        run: node scripts/generate-suguru.js

      - name: Generate Nonogram puzzles
        run: node scripts/generate-nonogram.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games/suguru/puzzles/*.json games/nonogram/puzzles/*.json
          if git diff --staged --quiet; then
            echo "No new puzzles to commit."
          else
            git commit -m "Add more puzzles (automated monthly run)"
            git push
          fi
