<svg viewBox="0 0 220 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground shadow -->
  <ellipse cx="110" cy="290" rx="95" ry="6" fill="#5a4028" opacity="0.15"/>

  <!-- Booth back base (floor/footing) -->
  <rect x="14" y="270" width="192" height="16" fill="#5e3d23" rx="1"/>
  <rect x="14" y="270" width="192" height="3" fill="#3e2715"/>

  <!-- Main booth body -->
  <rect x="20" y="40" width="180" height="235" fill="#8a5c38" rx="3"/>

  <!-- Wood grain lines -->
  <line x1="30" y1="50" x2="30" y2="270" stroke="#5e3d23" stroke-width="0.8" opacity="0.4"/>
  <line x1="45" y1="50" x2="45" y2="270" stroke="#5e3d23" stroke-width="0.5" opacity="0.3"/>
  <line x1="175" y1="50" x2="175" y2="270" stroke="#5e3d23" stroke-width="0.8" opacity="0.4"/>
  <line x1="190" y1="50" x2="190" y2="270" stroke="#5e3d23" stroke-width="0.5" opacity="0.3"/>

  <!-- Left column detail (trim) -->
  <rect x="22" y="42" width="3" height="231" fill="#a67548" opacity="0.6"/>
  <rect x="195" y="42" width="3" height="231" fill="#5e3d23" opacity="0.4"/>

  <!-- Top roof/cornice -->
  <rect x="12" y="34" width="196" height="14" fill="#5e3d23" rx="1"/>
  <rect x="12" y="34" width="196" height="3" fill="#3e2715"/>
  <rect x="12" y="45" width="196" height="3" fill="#3e2715"/>

  <!-- Pediment / top sign -->
  <rect x="40" y="8" width="140" height="32" fill="#8a5c38" rx="2"/>
  <rect x="40" y="8" width="140" height="4" fill="#5e3d23"/>
  <rect x="40" y="36" width="140" height="4" fill="#5e3d23"/>

  <!-- Sign cream panel -->
  <rect x="48" y="14" width="124" height="20" fill="#f4e8cf" rx="1"/>
  <text x="110" y="27" text-anchor="middle" font-family="Instrument Serif, serif" font-size="11" fill="#6e2b14" font-style="italic">Photobooth</text>

  <!-- Small bulbs on sign -->
  <circle cx="46" cy="24" r="2.5" fill="#f4d060"/>
  <circle cx="46" cy="24" r="1" fill="#fff5c4"/>
  <circle cx="174" cy="24" r="2.5" fill="#f4d060"/>
  <circle cx="174" cy="24" r="1" fill="#fff5c4"/>

  <!-- Curtains above door -->
  <path d="M 35 48 L 35 90 Q 55 80 75 90 Q 95 80 115 90 Q 135 80 155 90 Q 175 80 185 90 L 185 48 Z"
        fill="#9a3f24"/>
  <!-- Curtain folds -->
  <path d="M 50 48 Q 52 70 50 88" stroke="#6e2b14" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 75 48 Q 77 75 75 90" stroke="#6e2b14" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 100 48 Q 102 70 100 88" stroke="#6e2b14" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 125 48 Q 127 75 125 90" stroke="#6e2b14" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 150 48 Q 152 70 150 88" stroke="#6e2b14" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 170 48 Q 172 75 170 90" stroke="#6e2b14" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Curtain rod -->
  <rect x="28" y="44" width="164" height="4" fill="#5a3820"/>
  <circle cx="30" cy="46" r="3" fill="#3e2715"/>
  <circle cx="190" cy="46" r="3" fill="#3e2715"/>

  <!-- Door/entrance area -->
  <rect x="40" y="95" width="140" height="170" fill="#f4e8cf" rx="2"/>
  <rect x="40" y="95" width="140" height="170" fill="none" stroke="#5e3d23" stroke-width="2" rx="2"/>
  <rect x="44" y="99" width="132" height="162" fill="none" stroke="#c9b590" stroke-width="1" opacity="0.5" rx="1"/>

  <!-- Subtle curtain back inside the door -->
  <rect x="44" y="99" width="132" height="162" fill="#e8d3a8" opacity="0.5"/>
  <line x1="60" y1="99" x2="60" y2="261" stroke="#c9b590" stroke-width="0.8" opacity="0.5"/>
  <line x1="80" y1="99" x2="80" y2="261" stroke="#c9b590" stroke-width="0.8" opacity="0.5"/>
  <line x1="100" y1="99" x2="100" y2="261" stroke="#c9b590" stroke-width="0.8" opacity="0.5"/>
  <line x1="120" y1="99" x2="120" y2="261" stroke="#c9b590" stroke-width="0.8" opacity="0.5"/>
  <line x1="140" y1="99" x2="140" y2="261" stroke="#c9b590" stroke-width="0.8" opacity="0.5"/>
  <line x1="160" y1="99" x2="160" y2="261" stroke="#c9b590" stroke-width="0.8" opacity="0.5"/>

  <!-- Bottom step -->
  <rect x="32" y="262" width="156" height="10" fill="#5e3d23"/>
  <rect x="32" y="262" width="156" height="2" fill="#3e2715"/>

  <!-- Side bulb decorations -->
  <circle cx="28" cy="58" r="3" fill="#f4d060"/>
  <circle cx="28" cy="58" r="1.2" fill="#fff5c4"/>
  <circle cx="28" cy="85" r="3" fill="#f4d060"/>
  <circle cx="28" cy="85" r="1.2" fill="#fff5c4"/>
  <circle cx="192" cy="58" r="3" fill="#f4d060"/>
  <circle cx="192" cy="58" r="1.2" fill="#fff5c4"/>
  <circle cx="192" cy="85" r="3" fill="#f4d060"/>
  <circle cx="192" cy="85" r="1.2" fill="#fff5c4"/>
</svg>
